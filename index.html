<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vi.Ca - Pets em Tempo Real</title>
    <meta name="description" content="Dashboard de adoções em tempo real do Vi.Ca. Acompanhe a disponibilidade de pets, processos adotivos e adoções concluídas.">
    <!-- Open Graph (OG) Tags -->
    <meta property="og:title" content="Vi.Ca - Pets em Tempo Real">
    <meta property="og:description" content="Dashboard de adoções em tempo real do Vi.Ca. Acompanhe a disponibilidade de pets, processos adotivos e adoções concluídas.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://adocoes-tempo-real.adotevica.com.br/">
    <meta property="og:image" content="https://adocoes-tempo-real.adotevica.com.br/icons/icon-512x512.png">

    <!-- Anti-cache para HTML: garante que o navegador sempre busca a versão mais recente -->
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="icons/logoViCa.png">
    
    <!-- Google Fonts - Nunito (identidade visual Vi.Ca) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <div class="header-logo-container">
                    <img src="icons/logoViCa.png" alt="Vi.Ca Logo" class="header-logo">
                    <div class="header-text">
                        <h1 class="header-title">Quem adota muda vidas</h1>
                        <p class="header-subtitle">Disponibilidade dos nossos pets em tempo real</p>
                        <p class="header-datetime" id="current-datetime"></p>
                    </div>
                </div>
            </div>
        </header>

        <!-- Mobile: Barra de Abas + Navegação por Swipe (apenas visível no mobile) -->
        <div class="mobile-tabs" id="mobile-tabs">
            <button class="mobile-tab active" data-column="disponivel">
                <i class="fas fa-heart"></i>
                <span>Disponíveis</span>
                <span class="tab-badge" id="tab-disponivel-count">0</span>
            </button>
            <button class="mobile-tab" data-column="processo">
                <i class="fas fa-file-signature"></i>
                <span>Sendo Adotado</span>
                <span class="tab-badge" id="tab-processo-count">0</span>
            </button>
            <button class="mobile-tab" data-column="adotado">
                <i class="fas fa-home"></i>
                <span>Adotados</span>
                <span class="tab-badge" id="tab-adotado-count">0</span>
            </button>
        </div>

        <main class="main-content">
            <div class="kanban-board" id="kanban-board">
                <!-- Coluna Disponível -->
                <div class="kanban-column" data-column="disponivel">
                    <div class="column-header disponivel-header">
                        <i class="fas fa-heart"></i>
                        <h2>Disponíveis</h2>
                        <span class="badge" id="disponivel-count">0</span>
                    </div>
                    <div class="cards-container" id="disponivel-cards"></div>
                </div>

                <!-- Coluna Em Processo Adotivo -->
                <div class="kanban-column" data-column="processo">
                    <div class="column-header processo-header">
                        <i class="fas fa-file-signature"></i>
                        <h2>Sendo Adotado</h2>
                        <span class="badge" id="processo-count">0</span>
                    </div>
                    <div class="cards-container" id="processo-cards"></div>
                </div>

                <!-- Coluna Adotado -->
                <div class="kanban-column" data-column="adotado">
                    <div class="column-header adotado-header">
                        <i class="fas fa-home"></i>
                        <h2>Adotados</h2>
                        <span class="badge" id="adotado-count">0</span>
                    </div>
                    <div class="cards-container" id="adotado-cards"></div>
                </div>
            </div>

        </main>

        <footer class="footer">
            <p>Vi.Ca | Todos os direitos reservados</p>
            <p class="footer-note">Dashboard atualizado em tempo real</p>
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch((error) => {
                    console.error('Erro ao registrar service worker:', error);
                });
            });
        }
    </script>
</body>
</html>
