# Configuração do Netlify para o Dashboard Público Vi.Ca

[build]
  command = "npm run build"
  publish = "dist"
  
[build.environment]
  # Variáveis de ambiente (se necessário no futuro)
  NODE_VERSION = "18"

[[redirects]]
  # Redirecionar todas as rotas para index.html (SPA behavior)
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  
[[headers]]
  # Headers de segurança para todas as páginas
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    
[[headers]]
  # Cache para arquivos estáticos (cache busting via query string garante atualização)
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
    
[[headers]]
  # Não fazer cache do HTML para sempre ter versão mais recente
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

