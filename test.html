<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste - Dashboard Vi.Ca</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Teste de Conexão Supabase</h1>
    <div id="results"></div>
    
    <script>
        const SUPABASE_URL = 'https://dwrtskjadoocdxojkrlu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3cnRza2phZG9vY2R4b2prcmx1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzM3MDY2OTMsImV4cCI6MjA0OTI4MjY5M30.Ug5Efjr2kSdQyDyJoSKemCsWxRv0i3Ovf6PDOR3YCKE';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        async function testConnection() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<p>Testando conexão...</p>';
            
            try {
                const { data, error } = await supabase
                    .from('pets')
                    .select('id, nome, status')
                    .in('status', ['DISPONIVEL', 'EM_PROCESSO_ADOTIVO', 'ADOTADO'])
                    .limit(5);
                
                if (error) {
                    resultsDiv.innerHTML = `<p style="color: red;">❌ Erro: ${error.message}</p>`;
                    console.error('Erro:', error);
                    return;
                }
                
                resultsDiv.innerHTML = `
                    <p style="color: green;">✅ Conexão bem-sucedida!</p>
                    <p>Total de pets públicos: ${data.length}</p>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
                
                console.log('Dados recebidos:', data);
            } catch (err) {
                resultsDiv.innerHTML = `<p style="color: red;">❌ Erro: ${err.message}</p>`;
                console.error('Erro:', err);
            }
        }
        
        testConnection();
    </script>
</body>
</html>
